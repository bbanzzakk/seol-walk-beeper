<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2e26"/>
      <stop offset="50%" style="stop-color:#1c1f1a"/>
      <stop offset="100%" style="stop-color:#151815"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bezel)"/>
  <rect x="4" y="6" width="24" height="18" rx="3" fill="#0d1112" stroke="#2d4a28" stroke-width="1"/>
  <circle cx="24" cy="9" r="2" fill="#7dff6b" filter="url(#glow)"/>
</svg>
